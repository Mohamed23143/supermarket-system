
services:
  # خدمة قاعدة البيانات (PostgreSQL كمثال)
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: supermarket_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # دي أهم حتة لحل مشكلة الداتا (Seeding)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # خدمة التطبيق (مشروعك)
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/supermarket_db
    depends_on:
      - db
    restart: always

volumes:
  db_data: